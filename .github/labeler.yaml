# UI changes
ui:
  - changed-files:
      - any-glob-to-any-file: 'src/ui/**'
      - any-glob-to-any-file: 'tests/ui/**'
      - any-glob-to-any-file: '**/*.conf'

# Backend changes
backend:
  - changed-files:
      - any-glob-to-any-file: 'src/backend/**'
      - any-glob-to-any-file: 'tests/backend/**'

# Core Infrastructure changes
core:
  - changed-files:
      - any-glob-to-any-file: 'src/core/**'
      - any-glob-to-any-file: 'tests/core/**'
      - any-glob-to-any-file: 'tests/shared/**'
      - any-glob-to-any-file: 'src/app/**'
      - any-glob-to-any-file: 'tests/app/**'

# Installer and Deployment changes
installer:
  - changed-files:
      - any-glob-to-any-file: 'packaging/**'

# Build system changes
build-system:
  - changed-files:
      - all-globs-to-all-files: '**/CMakeLists.txt'
      - all-globs-to-all-files: 'cmake/**'
      - all-globs-to-all-files: 'scripts/**'

# Workflow changes
workflows:
  - changed-files:
      - any-glob-to-any-file: '.github/**'

# Documentation changes
documentation:
  - changed-files:
      - any-glob-to-any-file: 'docs/**'
      - any-glob-to-any-file: '*.md'