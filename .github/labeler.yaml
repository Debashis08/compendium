# UI changes
ui:
  - changed-files:
      - any-glob-to-any-file: 'src/ui/**'
      - any-glob-to-any-file: 'tests/ui/**'
      - any-glob-to-any-file: '*.qrc'
      - any-glob-to-any-file: '*.conf'

# Backend changes — any-glob fires it, all-globs block it if core files are present
backend:
  - all:
    - changed-files:
        - any-glob-to-any-file:
            - 'src/backend/**'
            - 'tests/backend/**'
    - changed-files:
        - all-globs-to-all-files:
            - '!src/backend/core/**'
            - '!tests/backend/core/**'

# Core Infrastructure changes
core:
  - changed-files:
      - any-glob-to-any-file: 'src/backend/core/**'
      - any-glob-to-any-file: 'tests/backend/core/**'

# Installer changes
installer:
  - changed-files:
      - any-glob-to-any-file: 'installer/**'

# Build system changes — only fires when every changed file is a cmake file
build-system:
  - changed-files:
      - all-globs-to-all-files: '**/CMakeLists.txt'
  - changed-files:
      - all-globs-to-all-files: '**/*.cmake'
  - changed-files:
      - all-globs-to-all-files: 'scripts/**'

# Workflow changes
workflows:
  - changed-files:
      - any-glob-to-any-file: '.github/**'

# Documentation changes
documentation:
  - changed-files:
      - any-glob-to-any-file: '*.md'